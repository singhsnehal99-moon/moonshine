<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Be My Girlfriend</title>
    <link rel="stylesheet" href="tangled_theme.css" />
  </head>
  <body>
    <div id="girlfriendQuestion"><b>sooooo I have a question</b></div>
    <img src="tangeld.gif.gif" alt="don't freak out" class="responsive" />
    <div id="girlfriendQuestion"><b>Will you be my girlfriend?</b></div>
    <button class="answerButton" onclick="location.href='thankyou.html'">
      Yes
    </button>
    <button class="answerButton" id="noButton">I no no wanna (╥﹏╥)</button>
    <br />
    <img src="duang_please,gif" alt="pleaseee" class="responsive" />

    <script>
      document
        .getElementById("noButton")
        .addEventListener("click", function () {
          var yesButton = document.querySelector(
            'button[onclick*="thankyou.html"]'
          );
          var currentFontSize = parseInt(
            window.getComputedStyle(yesButton).fontSize
          );
          yesButton.style.fontSize = currentFontSize + 10 + "px"; // Increase font size by 5px
        });
    </script>
  </body>
</html>
