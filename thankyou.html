<!DOCTYPE html>
<html>
<head>
  <title>Will you be my girlfriend?</title>

  <style>
    body {
      text-align: center;
      margin-top: 100px;
      font-family: Georgia, serif;
      background: #fff8f0;
      overflow: hidden;
    }

    button {
      border: none;
      border-radius: 25px;
      cursor: pointer;
      margin: 10px;
      transition: all 0.3s ease;
    }

    #yesBtn {
      background: #f7c948;
      font-size: 18px;
      padding: 12px 25px;
    }

    #noBtn {
      background: #ff9ecb;
      font-size: 18px;
      padding: 12px 25px;
    }

    #message {
      display: none;
      margin-top: 30px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }

    p {
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <h1>Will you be my girlfriend?</h1>

  <button id="yesBtn" onclick="celebrate()">YES 💖</button>
  <button id="noBtn" onclick="growYes()">NO 💔</button>

  <div id="message">
    <h2>You said YES 💖</h2>

    <p>I see the light… and it’s you ✨</p>

    <p>
      Thank you for saying yes.  
      I don’t take this lightly, and I’m really grateful for you.  
      I promise to always care about you, make you smile, and be someone you can trust. 💛
    </p>
  </div>
  <script src="script.js"></script>

</body>
</html>
